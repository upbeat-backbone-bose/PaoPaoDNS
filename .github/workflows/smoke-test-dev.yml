name: Smoke test PaoPaoDNS dev image

# 端到端冒烟测试：拉 GHCR dev 镜像，启动容器，验证 unbound + mosdns 协同工作。
# 触发：手动 workflow_dispatch，或 push 到 smoke-test/** 分支。

on:
  workflow_dispatch:
  push:
    branches:
      - smoke-test/**

permissions:
  contents: read
  packages: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Pull dev image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/paopaodns:dev
          docker images | grep paopaodns

      - name: Start container
        run: |
          # 53/udp + 53/tcp 给客户端 dig 验证；7889/tcp 暴露可验证 mosdns httpd 启动
          docker run -d --name paopaodns \
            -p 127.0.0.1:5353:53/udp \
            -p 127.0.0.1:5353:53/tcp \
            -p 127.0.0.1:7889:7889/tcp \
            -p 127.0.0.1:5304:5304/udp \
            -p 127.0.0.1:5304:5304/tcp \
            --privileged \
            ghcr.io/${{ github.repository_owner }}/paopaodns:dev
          sleep 8
          docker ps
          echo "=== container logs (first 80 lines) ==="
          docker logs paopaodns 2>&1 | head -80
          echo "=== container logs (last 50 lines) ==="
          docker logs paopaodns 2>&1 | tail -50
          echo "=== listening ports inside container ==="
          docker exec paopaodns netstat -tuln 2>/dev/null || docker exec paopaodns ss -tuln 2>/dev/null || true
          echo "=== process list inside container ==="
          docker exec paopaodns ps -ef 2>/dev/null | head -20 || true

      - name: Verify DNS resolution
        run: |
          apt-get install -y -qq dnsutils >/dev/null 2>&1 || sudo apt-get install -y -qq dnsutils >/dev/null 2>&1 || true
          which dig && dig -v
          echo "=== A example.com via mosdns 5353 ==="
          dig @127.0.0.1 -p 5353 example.com +time=10 +tries=2 2>&1 | head -20
          echo "=== A dns.google via mosdns 5353 ==="
          dig @127.0.0.1 -p 5353 dns.google +time=10 +tries=2 2>&1 | head -20
          echo "=== A example.com via unbound_forward 5304 ==="
          dig @127.0.0.1 -p 5304 example.com +time=10 +tries=2 2>&1 | head -20

      - name: Verify mosdns httpd_server up
        run: |
          echo "=== HTTP 7889 health ==="
          for i in 1 2 3 4 5; do
            code=$(curl -sS --max-time 3 -o /dev/null -w "%{http_code}" http://127.0.0.1:7889/ 2>&1)
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] || [ "$code" = "404" ] && break
            sleep 2
          done

      - name: Verify all 3 daemons (unbound, mosdns, redis) running
        run: |
          echo "=== process list inside container ==="
          docker exec paopaodns ps -ef 2>/dev/null | grep -E "unbound|mosdns|redis|init.sh" | head -20 || true
          echo "=== binary locations ==="
          docker exec paopaodns ls -la /src/ 2>/dev/null | head -10 || true
          echo "=== mosdns version (use /src/mosdns) ==="
          docker exec paopaodns /src/mosdns version 2>&1 | head -3 || true
          echo "=== mosdns healthz via /etc/hosts or 0.0.0.0 from inside ==="
          docker exec paopaodns wget -q -O- http://127.0.0.1:7889/ 2>&1 | head -5 || true

      - name: Cleanup
        if: always()
        run: |
          docker logs paopaodns > /tmp/paopaodns-smoke.log 2>&1 || true
          docker stop paopaodns 2>/dev/null || true
          docker rm paopaodns 2>/dev/null || true
