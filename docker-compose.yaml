version: "3"

services:
  paopaodns:
    # Use the maintainer's GHCR image pinned to a specific version tag
    # (or commit sha) rather than :latest. :latest breaks reproducibility:
    # any new build by the maintainer or any registry hiccup silently
    # changes what runs in production. Bump the version tag manually
    # after testing a new release. See .audit-docs/docs/audit-orchestration.md
    # P0-6.
    image: ghcr.io/upbeat-backbone-bose/paopaodns:dev
    container_name: PaoPaoDNS
    restart: always
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    volumes:
      - /share/Container/paopaodns:/data
    environment:
      - TZ=Asia/Shanghai
      - UPDATE=weekly
      - DNS_SERVERNAME=PaoPaoDNS,blog.03k.org
      - DNSPORT=53
      - SOCKS5=no
      - CNAUTO=yes
      - IPV6=no
      - CNFALL=yes
      - CUSTOM_FORWARD=10.10.10.3:53
      - AUTO_FORWARD=no
      - CN_TRACKER=yes
      - SAFEMODE=no
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "5304:5304/udp"
      - "5304:5304/tcp"
      - "7889:7889/tcp"